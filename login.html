<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в личный кабинет — ABA_pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .auth-container h2 { color: var(--color-text); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--color-text-light); }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid var(--color-sand-light); border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .form-group input:focus { border-color: var(--color-blue); outline: none; }
        .btn-auth { width: 100%; padding: 14px; background: var(--color-blue); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-auth:hover { background: var(--color-blue-dark); }
        .error-msg { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 6px; margin-bottom: 20px; display: none; font-size: 0.9rem; }
        .toggle-link { margin-top: 20px; font-size: 0.9rem; }
        .toggle-link a { color: var(--color-blue); text-decoration: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 id="authTitle">🔐 Вход</h2>
        <div id="errorMsg" class="error-msg"></div>

        <form id="authForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="ваш@email.com" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="••••••" required>
            </div>
            <div class="form-group" id="roleGroup" style="display:none;">
                <label>Кто вы?</label>
                <select id="role">
                    <option value="client">🧩 Я Клиент</option>
                    <option value="specialist">👤 Я Специалист</option>
                </select>
            </div>
            <button type="submit" class="btn-auth" id="submitBtn">Войти</button>
        </form>

        <div class="toggle-link">
            <span id="toggleText">Нет аккаунта?</span> <a id="toggleAuth">Зарегистрироваться</a>
        </div>
        
        <p style="margin-top:25px;font-size:0.85rem;color:#888;">
            ⚠️ Тестовый режим. Не используйте реальные данные.
        </p>
    </div>

    <script type="module">
        import { 
            auth, db, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged 
        } from './firebase-config.js';
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        let isLogin = true;
        const toggleAuth = document.getElementById('toggleAuth');
        const toggleText = document.getElementById('toggleText');
        const authTitle = document.getElementById('authTitle');
        const submitBtn = document.getElementById('submitBtn');
        const roleGroup = document.getElementById('roleGroup');
        const errorMsg = document.getElementById('errorMsg');

        // Переключение Вход/Регистрация
        toggleAuth.addEventListener('click', () => {
            isLogin = !isLogin;
            authTitle.textContent = isLogin ? "🔐 Вход" : "📝 Регистрация";
            submitBtn.textContent = isLogin ? "Войти" : "Зарегистрироваться";
            toggleText.textContent = isLogin ? "Нет аккаунта? " : "Есть аккаунт? ";
            toggleAuth.textContent = isLogin ? "Зарегистрироваться" : "Войти";
            roleGroup.style.display = isLogin ? "none" : "block";
            errorMsg.style.display = 'none';
        });

        // Обработка формы
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            errorMsg.style.display = 'none';

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    await setDoc(doc(db, "users", user.uid), {
                        email: email,
                        role: role,
                        name: email.split('@')[0],
                        createdAt: new Date()
                    });
                    alert("✅ Регистрация успешна!");
                }
            } catch (error) {
                showError(error.message);
            }
        });

        // Отслеживание состояния входа
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        window.location.href = userData.role === 'specialist' 
                            ? 'cabinet-specialist.html' 
                            : 'cabinet-client.html';
                    } else {
                        showError("❌ Данные пользователя не найдены");
                    }
                } catch (err) {
                    showError("Ошибка загрузки данных: " + err.message);
                }
            }
        });

        function showError(msg) {
            let friendly = "Произошла ошибка";
            if (msg.includes("user-not-found") || msg.includes("wrong-password")) 
                friendly = "❌ Неверный email или пароль";
            else if (msg.includes("email-already-in-use")) 
                friendly = "❌ Этот email уже зарегистрирован";
            else if (msg.includes("weak-password")) 
                friendly = "❌ Пароль должен быть минимум 6 символов";
            
            errorMsg.textContent = friendly;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
